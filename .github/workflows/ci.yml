name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy registry
